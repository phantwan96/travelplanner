<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Travel Planner</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3f0e8;
        --ink: #1e2724;
        --muted: #66736e;
        --card: rgb(255 255 255 / 0.78);
        --line: rgb(30 39 36 / 0.16);
        --accent: #b64036;
        --shadow: 0 24px 80px rgb(30 39 36 / 0.16);
        font-family:
          "Avenir Next",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111816;
          --ink: #edf4ef;
          --muted: #aebbb6;
          --card: rgb(24 34 31 / 0.82);
          --line: rgb(237 244 239 / 0.16);
          --accent: #ef7b6f;
          --shadow: 0 24px 80px rgb(0 0 0 / 0.34);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background:
          radial-gradient(circle at 16% 16%, rgb(182 64 54 / 0.18), transparent 30%),
          radial-gradient(circle at 84% 18%, rgb(31 111 98 / 0.16), transparent 32%),
          linear-gradient(135deg, var(--bg), #dfe8df);
        color: var(--ink);
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: clamp(40px, 7vw, 88px) 0;
      }

      .hero {
        display: grid;
        gap: 16px;
        max-width: 760px;
      }

      .kicker {
        margin: 0;
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 92px);
        line-height: 0.92;
        letter-spacing: -0.06em;
      }

      .intro {
        margin: 0;
        max-width: 620px;
        color: var(--muted);
        font-size: clamp(17px, 2vw, 21px);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin-top: clamp(34px, 6vw, 72px);
      }

      .trip-card {
        position: relative;
        display: grid;
        min-height: 310px;
        padding: 26px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: var(--shadow);
        color: inherit;
        text-decoration: none;
        transition:
          transform 180ms ease,
          border-color 180ms ease;
      }

      .trip-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(145deg, rgb(182 64 54 / 0.2), transparent 46%),
          radial-gradient(circle at 78% 28%, rgb(230 179 105 / 0.42), transparent 28%);
        pointer-events: none;
      }

      .trip-card:hover {
        transform: translateY(-4px);
        border-color: rgb(182 64 54 / 0.46);
      }

      .trip-card > * {
        position: relative;
      }

      .trip-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-self: start;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 10px;
        background: rgb(255 255 255 / 0.44);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .trip-title {
        align-self: end;
      }

      .trip-title h2 {
        margin: 0 0 10px;
        font-size: 40px;
        line-height: 1;
      }

      .trip-title p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .empty-card {
        display: grid;
        min-height: 310px;
        place-items: center;
        border: 1px dashed var(--line);
        border-radius: 24px;
        color: var(--muted);
        text-align: center;
      }

      footer {
        margin-top: 24px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="旅行计划首页">
        <p class="kicker">Personal Travel Planner</p>
        <h1>旅行路书库</h1>
        <p class="intro">
          一个目的地一个文件夹：沉淀路线、地图、每日安排和方案对比。现在先放埃及，之后新增目的地可以继续复用这个结构。
        </p>
      </section>

      <section class="grid" aria-label="目的地列表">
        <a class="trip-card" href="./egypt/">
          <div class="trip-meta">
            <span class="chip">2026 十一</span>
            <span class="chip">12 天</span>
            <span class="chip">3 套方案</span>
          </div>
          <div class="trip-title">
            <h2>埃及</h2>
            <p>开罗、阿斯旺、卢克索、红海；含阿布辛贝与非阿布辛贝节奏对比。</p>
          </div>
        </a>

        <div class="empty-card">
          <p>下一站预留位<br />新增目的地时复制一个文件夹就好</p>
        </div>
      </section>

      <footer>
        GitHub Pages 静态托管，无需服务器。公开仓库里只放网页与地图资源，不放私人偏好文档。
      </footer>
    </main>
  </body>
</html>
